apiVersion: v1
kind: Service
metadata:
  name: <YOUR_USERNAME>-<YOUR_SERVICE_NAME>
spec:
  selector:
    app: <YOUR_USERNAME>-<YOUR_SERVICE_NAME>
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: mgmt
      protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
