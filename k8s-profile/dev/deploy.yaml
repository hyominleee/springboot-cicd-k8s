apiVersion: apps/v1
kind: Deployment
metadata:
  name: <YOUR_USERNAME>-myfirst-api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <YOUR_USERNAME>-myfirst-api-server
  template:
    metadata:
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/actuator/prometheus'
        update: 7bd2c41b
      labels:
        app: <YOUR_USERNAME>-myfirst-api-server
    spec:
      serviceAccountName: default
      containers:
      - name: myfirst-api-server
        image: <YOUR_REGISTRY>/<YOUR_PROJECT>/<YOUR_IMAGE_NAME>:<VERSION>
        imagePullPolicy: Always
        env:
        - name: USER_NAME
          value: <YOUR_USERNAME>
        - name: NAMESPACE
          value: <YOUR_NAMESPACE>
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
